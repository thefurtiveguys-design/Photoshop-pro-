<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Poster Generator - Deadly Dead</title>
    
    <!-- Pyodide - Python dans le navigateur -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        :root {
            --blood: #cc0000;
            --dark: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            padding: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #3a0000;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2), inset 0 0 50px rgba(255, 0, 0, 0.05);
        }

        h1 {
            font-size: 2.5em;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5), 3px 3px 0 #000;
            margin-bottom: 5px;
            letter-spacing: 4px;
        }

        .tagline {
            color: #999;
            font-size: 1em;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        .poster-preview {
            width: 220px;
            height: 311px;
            margin: 20px auto;
            border: 3px solid #3a0000;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-icon {
            font-size: 4em;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .specs {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .spec {
            background: rgba(255, 0, 0, 0.08);
            border: 1px solid #3a0000;
            padding: 12px 18px;
            border-radius: 8px;
            color: #ccc;
            font-size: 0.85em;
        }

        .spec strong {
            color: #cc0000;
            display: block;
            font-size: 1.1em;
        }

        .btn {
            display: inline-block;
            padding: 16px 45px;
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(180deg, #cc0000 0%, #660000 100%);
            border: 2px solid #990000;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 0, 0, 0.4);
            margin: 10px 5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(255, 0, 0, 0.6);
            background: linear-gradient(180deg, #dd1111 0%, #770000 100%);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-small {
            padding: 10px 25px;
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .progress-bar {
            display: none;
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: #1a0000;
            border-radius: 10px;
            margin: 15px auto;
            overflow: hidden;
            border: 1px solid #3a0000;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #660000, #cc0000);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .status {
            display: none;
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .error-msg {
            color: #ff4444;
            background: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .footer-note {
            margin-top: 25px;
            color: #666;
            font-size: 0.75em;
        }

        @media (max-width: 500px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 1.8em; }
            .btn { padding: 14px 30px; font-size: 1em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DEADLY DEAD</h1>
    <p class="tagline">HORROR POSTER GENERATOR</p>

    <!-- Aperçu -->
    <div class="poster-preview" id="previewBox">
        <span class="placeholder-icon" id="placeholderIcon">💀</span>
        <img id="previewImg" style="display:none;" alt="Poster preview">
    </div>

    <!-- Spécifications -->
    <div class="specs">
        <div class="spec"><strong>A4</strong> 2480 × 3508</div>
        <div class="spec"><strong>300</strong> DPI</div>
        <div class="spec"><strong>PNG</strong> HD Quality</div>
        <div class="spec"><strong>Horror</strong> Style</div>
    </div>

    <!-- Barre de progression -->
    <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"></div>
    </div>
    <div class="status" id="statusMsg">⏳ Chargement de Python...</div>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Boutons -->
    <button class="btn" id="btnGenerate" onclick="generatePoster()">
        🎬 Générer l'affiche
    </button>
    <br>
    <button class="btn btn-small" id="btnDownload" onclick="downloadPoster()" disabled style="display:none;">
        ⬇️ Télécharger le PNG
    </button>

    <p class="footer-note">⚡ Aucun serveur • 100% navigateur • Python via Pyodide</p>
</div>

<script>
    let pyodide = null;
    let posterBytes = null;
    let isPyodideReady = false;

    // Éléments DOM
    const btnGenerate = document.getElementById('btnGenerate');
    const btnDownload = document.getElementById('btnDownload');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const statusMsg = document.getElementById('statusMsg');
    const errorMsg = document.getElementById('errorMsg');
    const previewImg = document.getElementById('previewImg');
    const placeholderIcon = document.getElementById('placeholderIcon');

    // Met à jour la barre de progression
    function updateProgress(percent, message) {
        progressBar.style.display = 'block';
        statusMsg.style.display = 'block';
        progressFill.style.width = percent + '%';
        statusMsg.textContent = message;
    }

    // Cache la barre de progression
    function hideProgress() {
        progressBar.style.display = 'none';
        statusMsg.style.display = 'none';
    }

    // Affiche une erreur
    function showError(msg) {
        errorMsg.textContent = '❌ ' + msg;
        errorMsg.style.display = 'block';
        hideProgress();
        btnGenerate.disabled = false;
    }

    // Cache l'erreur
    function clearError() {
        errorMsg.style.display = 'none';
    }

    // Charge Pyodide au démarrage
    async function loadPyodide() {
        if (isPyodideReady) return;
        
        btnGenerate.disabled = true;
        updateProgress(10, '⏳ Téléchargement de Pyodide (Python pour navigateur)...');
        
        try {
            pyodide = await loadPyodide({
                indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/"
            });
            
            updateProgress(40, '📦 Installation de Pillow...');
            await pyodide.loadPackage('pillow');
            
            updateProgress(70, '📦 Installation de NumPy...');
            await pyodide.loadPackage('numpy');
            
            updateProgress(100, '✅ Prêt ! Clique sur Générer.');
            
            isPyodideReady = true;
            btnGenerate.disabled = false;
            
            setTimeout(hideProgress, 2000);
            
        } catch (err) {
            showError('Impossible de charger Python : ' + err.message);
        }
    }

    // Génère l'affiche
    async function generatePoster() {
        if (!isPyodideReady) {
            showError('Python n\'est pas encore chargé. Attends quelques secondes...');
            return;
        }
        
        clearError();
        btnGenerate.disabled = true;
        btnDownload.style.display = 'none';
        btnDownload.disabled = true;
        updateProgress(0, '🎨 Génération du fond...');
        
        try {
            const pythonCode = `
import numpy as np
from PIL import Image, ImageDraw, ImageFilter, ImageFont
import math
import random
import io
import base64

W, H = 2480, 3508
CENTER = (W//2, H//2)

# --- FOND NOIR TEXTURÉ ---
bg = Image.new('RGB', (W, H), (5, 0, 2))
draw = ImageDraw.Draw(bg)

# Dégradé radial rouge sombre
for y in range(0, H, 12):
    for x in range(0, W, 12):
        dx = x - CENTER[0]
        dy = y - CENTER[1]
        dist = math.sqrt(dx*dx + dy*dy)
        val = int(25 * max(0, 1 - dist/1800))
        draw.rectangle([x, y, x+12, y+12], fill=(val, 0, 0))

# Vignette noire
vignette = Image.new('L', (W, H), 0)
v_draw = ImageDraw.Draw(vignette)
for y in range(0, H, 10):
    for x in range(0, W, 10):
        dx = x - CENTER[0]
        dy = y - CENTER[1]
        dist = math.sqrt(dx*dx + dy*dy)
        alpha = int(180 * (dist / 2000) ** 1.5)
        alpha = min(180, alpha)
        v_draw.rectangle([x, y, x+10, y+10], fill=alpha)
vignette = vignette.filter(ImageFilter.GaussianBlur(radius=25))
bg.paste((0, 0, 0), mask=vignette)

# Bruit / grain
noise = np.random.normal(0, 10, (H, W, 3)).astype(np.int16)
bg_arr = np.array(bg).astype(np.int16) + noise
bg_arr = np.clip(bg_arr, 0, 255).astype(np.uint8)
bg = Image.fromarray(bg_arr)

# Brume en bas
mist = Image.new('RGBA', (W, H), (0, 0, 0, 0))
m_draw = ImageDraw.Draw(mist)
for _ in range(30):
    mx = random.randint(0, W)
    my = random.randint(int(H*0.7), H)
    mr = random.randint(200, 500)
    ma = random.randint(5, 20)
    m_draw.ellipse([mx-mr, my-mr, mx+mr, my+mr], fill=(40, 0, 0, ma))
mist = mist.filter(ImageFilter.GaussianBlur(radius=50))
bg = Image.alpha_composite(bg.convert('RGBA'), mist).convert('RGB')

# --- EFFETS HORREUR ---
fx = Image.new('RGBA', (W, H), (0, 0, 0, 0))
fx_draw = ImageDraw.Draw(fx)

# Griffures
for _ in range(25):
    x = random.randint(0, W)
    y = random.randint(0, H)
    angle = random.uniform(0, 2*math.pi)
    length = random.randint(60, 250)
    dx = length * math.cos(angle)
    dy = length * math.sin(angle)
    for i in range(3):
        fx_draw.line([(x+i, y+i), (x+dx+i, y+dy+i)], fill=(0, 0, 0, random.randint(30, 80)), width=1)

# Éclaboussures de sang
for _ in range(18):
    cx = random.randint(100, W-100)
    cy = random.randint(100, H-400)
    size = random.randint(15, 50)
    alpha = random.randint(40, 90)
    fx_draw.ellipse([cx-size, cy-size, cx+size, cy+size], fill=(140, 0, 0, alpha))
    for _ in range(3):
        sx = cx + random.randint(-size, size)
        sy = cy + random.randint(-size, size)
        sr = random.randint(3, 8)
        fx_draw.ellipse([sx-sr, sy-sr, sx+sr, sy+sr], fill=(100, 0, 0, alpha//2))

# Coulures verticales
for _ in range(10):
    x = random.randint(100, W-100)
    y_start = random.randint(300, 1600)
    length = random.randint(60, 200)
    for step in range(length):
        alpha = max(0, 100 - step)
        fx_draw.ellipse([x-3, y_start+step, x+3, y_start+step+8], fill=(80, 0, 0, alpha))

# --- TITRE ---
title = Image.new('RGBA', (W, H), (0, 0, 0, 0))
t_draw = ImageDraw.Draw(title)

# Police par défaut (grande taille)
try:
    font1 = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 350)
    font2 = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 460)
except:
    font1 = ImageFont.load_default()
    font2 = font1

text1 = "DEADLY"
text2 = "DEAD"
y1 = 1000
y2 = y1 + 450

# Ombres
for off in [(8,8), (12,12), (16,16)]:
    t_draw.text((CENTER[0], y1), text1, font=font1, fill=(0,0,0,160), anchor='mm', stroke_width=off[0], stroke_fill=(0,0,0,80))
    t_draw.text((CENTER[0], y2), text2, font=font2, fill=(0,0,0,160), anchor='mm', stroke_width=off[0], stroke_fill=(0,0,0,80))

# Texte rouge sang
t_draw.text((CENTER[0], y1), text1, font=font1, fill=(200, 15, 15, 255), anchor='mm', stroke_width=10, stroke_fill=(50, 0, 0, 255))
t_draw.text((CENTER[0], y2), text2, font=font2, fill=(220, 18, 18, 255), anchor='mm', stroke_width=14, stroke_fill=(70, 0, 0, 255))

# Coulures depuis le titre
bleed_pts = [(CENTER[0]-280, y2+160), (CENTER[0]+60, y2+220), (CENTER[0]+230, y2+130)]
for bx, by in bleed_pts:
    blen = random.randint(80, 180)
    for d in range(blen):
        alpha = max(0, 140 - d)
        t_draw.ellipse([bx-3, by+d, bx+3, by+d+10], fill=(170, 0, 0, alpha))

# --- SOUS-TITRE ---
sub = Image.new('RGBA', (W, H), (0, 0, 0, 0))
s_draw = ImageDraw.Draw(sub)
try:
    sub_font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 120)
except:
    sub_font = ImageFont.load_default()

y_sub = 2300
s_draw.text((CENTER[0], y_sub), "THEY ARE COMING BACK", font=sub_font, fill=(210, 210, 210, 220), anchor='mm', stroke_width=4, stroke_fill=(0, 0, 0, 180))

# Lignes décoratives
for ly in [y_sub-80, y_sub+80]:
    s_draw.line([(W//4, ly), (3*W//4, ly)], fill=(150, 0, 0, 180), width=3)

# --- FOOTER ---
foot = Image.new('RGBA', (W, H), (0, 0, 0, 0))
f_draw = ImageDraw.Draw(foot)
try:
    foot_font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 70)
except:
    foot_font = ImageFont.load_default()

y_ft = 3150
f_draw.text((CENTER[0], y_ft), "COMING SOON", font=foot_font, fill=(150, 150, 150, 190), anchor='mm', stroke_width=2, stroke_fill=(0, 0, 0, 150))

# --- ASSEMBLAGE FINAL ---
final = bg.convert('RGBA')
final = Image.alpha_composite(final, fx)
final = Image.alpha_composite(final, sub)
final = Image.alpha_composite(final, title)
final = Image.alpha_composite(final, foot)

# Redimensionner pour aperçu (plus petit)
preview = final.copy()
preview.thumbnail((500, 707), Image.LANCZOS)

# Convertir en base64 pour aperçu
buf_preview = io.BytesIO()
preview.convert('RGB').save(buf_preview, format='JPEG', quality=85)
buf_preview.seek(0)
preview_b64 = base64.b64encode(buf_preview.read()).decode('utf-8')

# Image HD pour téléchargement
buf_hd = io.BytesIO()
final.convert('RGB').save(buf_hd, format='PNG')
buf_hd.seek(0)
hd_b64 = base64.b64encode(buf_hd.read()).decode('utf-8')

preview_b64, hd_b64
`;
            
            updateProgress(20, '🎨 Exécution du script Python...');
            
            // Exécute le code Python
            const result = await pyodide.runPythonAsync(pythonCode);
            
            updateProgress(80, '🖼️ Rendu de l\'image...');
            
            // Récupère les images
            const [previewB64, hdB64] = result.toJs();
            
            // Affiche l'aperçu
            previewImg.src = 'data:image/jpeg;base64,' + previewB64;
            previewImg.style.display = 'block';
            placeholderIcon.style.display = 'none';
            
            // Stocke l'image HD pour téléchargement
            posterBytes = hdB64;
            
            // Active le bouton de téléchargement
            btnDownload.style.display = 'inline-block';
            btnDownload.disabled = false;
            
            updateProgress(100, '✅ Affiche générée avec succès !');
            
            setTimeout(hideProgress, 2500);
            btnGenerate.disabled = false;
            btnGenerate.textContent = '🔄 Regénérer';
            
        } catch (err) {
            showError('Erreur lors de la génération : ' + err.message);
            btnGenerate.textContent = '🎬 Générer l\'affiche';
        }
    }

    // Télécharge l'affiche en HD
    function downloadPoster() {
        if (!posterBytes) return;
        
        const link = document.createElement('a');
        link.href = 'data:image/png;base64,' + posterBytes;
        link.download = 'deadly_dead_poster.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Lance le chargement de Pyodide au démarrage
    loadPyodide();
</script>
