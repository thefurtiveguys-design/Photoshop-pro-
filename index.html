<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosterForge – Éditeur d'affiches en ligne</title>
    <!-- Icônes Font Awesome (pro, sans emoji) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Fabric.js pour le canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-input: #333333;
            --text-primary: #cccccc;
            --text-secondary: #999999;
            --border: #3c3c3c;
            --accent: #0078d4;
            --accent-hover: #1a8ad4;
            --danger: #d32f2f;
            --sidebar-width: 260px;
            --toolbar-width: 48px;
            --header-height: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ========== HEADER ========== */
        .header {
            height: var(--header-height);
            background: #2d2d30;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid var(--border);
            gap: 20px;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: #fff;
        }
        .logo i {
            margin-right: 6px;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .btn {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
        }
        .btn:hover {
            background: #3e3e42;
        }
        .btn i {
            font-size: 14px;
        }

        /* ========== MAIN LAYOUT ========== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== TOOLBAR (gauche) ========== */
        .toolbar {
            width: var(--toolbar-width);
            background: #2d2d30;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 4px;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .tool-btn:hover {
            background: #3e3e42;
        }
        .tool-btn.active {
            background: var(--accent);
            color: white;
        }
        .tool-btn i {
            font-size: 18px;
        }

        .tool-separator {
            width: 28px;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ========== CANVAS AREA (centre) ========== */
        .canvas-area {
            flex: 1;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-container {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ========== SIDEBAR (droite) ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* Layers */
        .layer-item {
            display: flex;
            align-items: center;
            padding: 5px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            cursor: pointer;
            gap: 8px;
            font-size: 12px;
        }
        .layer-item:hover {
            background: #2a2a2e;
        }
        .layer-item.selected {
            background: var(--accent);
        }
        .layer-item i {
            font-size: 14px;
            width: 16px;
            text-align: center;
            color: #aaa;
        }
        .layer-item .layer-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .layer-item .layer-visibility {
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
        }
        .layer-item .layer-visibility.hidden {
            color: #555;
        }
        .layer-actions {
            display: flex;
            gap: 4px;
        }
        .layer-actions i {
            cursor: pointer;
            font-size: 13px;
            padding: 2px;
        }

        /* Properties */
        .prop-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
            font-size: 12px;
        }
        .prop-row label {
            width: 55px;
            color: var(--text-secondary);
        }
        .prop-row input[type="color"] {
            width: 32px;
            height: 24px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            cursor: pointer;
        }
        .prop-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }
        .prop-row input[type="number"] {
            width: 55px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 2px 5px;
            border-radius: 3px;
            text-align: center;
        }

        /* Status bar */
        .statusbar {
            height: 24px;
            background: #007acc;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            gap: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo"><i class="fa-solid fa-paint-brush"></i> PosterForge</div>
        <div class="header-actions">
            <button class="btn" onclick="newDocument()"><i class="fa-solid fa-file"></i> Nouveau</button>
            <button class="btn" onclick="downloadImage('png')"><i class="fa-solid fa-download"></i> PNG</button>
            <button class="btn" onclick="downloadImage('jpeg')"><i class="fa-solid fa-download"></i> JPEG</button>
            <button class="btn" onclick="undo()"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="btn" onclick="redo()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-container">
        <!-- TOOLBAR -->
        <div class="toolbar" id="toolbar">
            <div class="tool-btn active" data-tool="select" title="Sélection (V)"><i class="fa-solid fa-arrow-pointer"></i></div>
            <div class="tool-btn" data-tool="rectangle" title="Rectangle (R)"><i class="fa-regular fa-square"></i></div>
            <div class="tool-btn" data-tool="circle" title="Cercle (C)"><i class="fa-regular fa-circle"></i></div>
            <div class="tool-btn" data-tool="line" title="Ligne (L)"><i class="fa-solid fa-minus"></i></div>
            <div class="tool-btn" data-tool="text" title="Texte (T)"><i class="fa-solid fa-font"></i></div>
            <div class="tool-separator"></div>
            <div class="tool-btn" data-tool="delete" title="Supprimer (Suppr)"><i class="fa-solid fa-trash-can"></i></div>
            <div class="tool-btn" id="uploadImageBtn" title="Importer une image"><i class="fa-solid fa-image"></i></div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <!-- CANVAS -->
        <div class="canvas-area" id="canvasWrapper">
            <canvas id="myCanvas"></canvas>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <!-- Calques -->
            <div class="panel">
                <div class="panel-title">Calques</div>
                <div id="layersList" style="max-height:250px; overflow-y:auto;"></div>
                <div style="margin-top:6px; display:flex; gap:4px;">
                    <button class="btn" onclick="moveLayerUp()"><i class="fa-solid fa-arrow-up"></i></button>
                    <button class="btn" onclick="moveLayerDown()"><i class="fa-solid fa-arrow-down"></i></button>
                    <button class="btn" onclick="duplicateLayer()"><i class="fa-regular fa-copy"></i></button>
                </div>
            </div>

            <!-- Propriétés -->
            <div class="panel">
                <div class="panel-title">Propriétés</div>
                <div class="prop-row">
                    <label>Couleur</label>
                    <input type="color" id="fillColor" value="#cc0000" onchange="updateProperty('fill', this.value)">
                </div>
                <div class="prop-row">
                    <label>Contour</label>
                    <input type="color" id="strokeColor" value="#000000" onchange="updateProperty('stroke', this.value)">
                </div>
                <div class="prop-row">
                    <label>Épaisseur</label>
                    <input type="range" id="strokeWidth" min="0" max="20" value="2" oninput="updateProperty('strokeWidth', this.value)">
                    <input type="number" id="strokeWidthNum" min="0" max="20" value="2" onchange="updateProperty('strokeWidth', this.value)">
                </div>
                <div class="prop-row">
                    <label>Opacité</label>
                    <input type="range" id="opacity" min="0" max="1" step="0.01" value="1" oninput="updateProperty('opacity', this.value)">
                    <span id="opacityVal">100%</span>
                </div>
            </div>

            <!-- Taille de l'espace de travail -->
            <div class="panel">
                <div class="panel-title">Document</div>
                <div class="prop-row">
                    <label>Largeur</label>
                    <input type="number" id="canvasWidth" value="2480" min="100" max="8000">
                </div>
                <div class="prop-row">
                    <label>Hauteur</label>
                    <input type="number" id="canvasHeight" value="3508" min="100" max="8000">
                </div>
                <button class="btn" onclick="resizeCanvas()">Appliquer</button>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
        <span id="canvasSizeInfo">2480 × 3508 px</span>
        <span id="zoomInfo">100%</span>
    </div>

    <script>
        // ==================== INITIALISATION ====================
        const canvas = new fabric.Canvas('myCanvas', {
            width: 2480,
            height: 3508,
            backgroundColor: '#050000',
            preserveObjectStacking: true,
        });

        // Ajustement du canvas dans la zone visible (zoom automatique)
        function fitCanvasToScreen() {
            const wrapper = document.getElementById('canvasWrapper');
            const scaleX = (wrapper.clientWidth - 40) / canvas.width;
            const scaleY = (wrapper.clientHeight - 40) / canvas.height;
            const scale = Math.min(scaleX, scaleY, 0.25); // max 25% de zoom
            canvas.setZoom(scale);
            canvas.setWidth(canvas.width * scale);
            canvas.setHeight(canvas.height * scale);
            canvas.renderAll();
            updateStatusBar();
        }
        window.addEventListener('resize', fitCanvasToScreen);
        fitCanvasToScreen();

        // ==================== OUTILS ====================
        let currentTool = 'select';
        const toolButtons = document.querySelectorAll('.tool-btn[data-tool]');
        toolButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.tool-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                canvas.isDrawingMode = false;
                canvas.selection = (currentTool === 'select');
            });
        });

        // Gestion des clics sur le canvas pour créer des formes
        canvas.on('mouse:down', function(opt) {
            if (currentTool === 'select' || currentTool === 'delete') return;

            const pointer = canvas.getPointer(opt.e);
            let shape;

            switch (currentTool) {
                case 'rectangle':
                    shape = new fabric.Rect({
                        left: pointer.x,
                        top: pointer.y,
                        width: 200,
                        height: 150,
                        fill: document.getElementById('fillColor').value,
                        stroke: document.getElementById('strokeColor').value,
                        strokeWidth: parseInt(document.getElementById('strokeWidth').value),
                        opacity: parseFloat(document.getElementById('opacity').value),
                    });
                    break;
                case 'circle':
                    shape = new fabric.Ellipse({
                        left: pointer.x,
                        top: pointer.y,
                        rx: 100,
                        ry: 80,
                        fill: document.getElementById('fillColor').value,
                        stroke: document.getElementById('strokeColor').value,
                        strokeWidth: parseInt(document.getElementById('strokeWidth').value),
                        opacity: parseFloat(document.getElementById('opacity').value),
                    });
                    break;
                case 'line':
                    shape = new fabric.Line([pointer.x, pointer.y, pointer.x + 200, pointer.y + 50], {
                        stroke: document.getElementById('fillColor').value,
                        strokeWidth: parseInt(document.getElementById('strokeWidth').value),
                        opacity: parseFloat(document.getElementById('opacity').value),
                    });
                    break;
                case 'text':
                    shape = new fabric.IText('Texte', {
                        left: pointer.x,
                        top: pointer.y,
                        fontFamily: 'Arial',
                        fontSize: 120,
                        fill: document.getElementById('fillColor').value,
                        opacity: parseFloat(document.getElementById('opacity').value),
                    });
                    break;
                default:
                    return;
            }

            if (shape) {
                canvas.add(shape);
                canvas.setActiveObject(shape);
                saveState();
                updateLayersPanel();
            }
        });

        // Suppression d'objet via outil ou touche Suppr
        function deleteSelected() {
            const active = canvas.getActiveObject();
            if (active) {
                canvas.remove(active);
                canvas.discardActiveObject();
                saveState();
                updateLayersPanel();
            }
        }
        document.querySelector('.tool-btn[data-tool="delete"]').addEventListener('click', deleteSelected);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
                    deleteSelected();
                }
            }
        });

        // Import image
        document.getElementById('uploadImageBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, (img) => {
                    img.scaleToWidth(canvas.width * 0.5);
                    img.set({ left: 100, top: 100 });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    saveState();
                    updateLayersPanel();
                });
            };
            reader.readAsDataURL(file);
            this.value = '';
        });

        // ==================== HISTORIQUE (annuler/rétablir) ====================
        const history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;

        function saveState() {
            // Supprimer les états futurs si on est pas au bout
            if (historyIndex < history.length - 1) {
                history.splice(historyIndex + 1);
            }
            const json = JSON.stringify(canvas.toDatalessJSON(['selectable', 'evented']));
            history.push(json);
            if (history.length > MAX_HISTORY) history.shift();
            historyIndex = history.length - 1;
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            loadState(history[historyIndex]);
        }

        function redo() {
            if (historyIndex >= history.length - 1) return;
            historyIndex++;
            loadState(history[historyIndex]);
        }

        function loadState(json) {
            canvas.loadFromJSON(json, () => {
                canvas.renderAll();
                updateLayersPanel();
            });
        }

        // Capture de l'état initial
        canvas.on('object:modified', () => { saveState(); updateLayersPanel(); });
        canvas.on('object:added', () => { if (!canvas.isLoading) { saveState(); updateLayersPanel(); } });
        canvas.on('object:removed', () => { if (!canvas.isLoading) { saveState(); updateLayersPanel(); } });
        saveState(); // état initial

        // ==================== PANNEAU DES CALQUES ====================
        function updateLayersPanel() {
            const list = document.getElementById('layersList');
            const objects = canvas.getObjects();
            let html = '';
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                const name = obj.type === 'i-text' ? (obj.text || 'Texte') : (obj.type || 'Objet');
                const isActive = canvas.getActiveObject() === obj;
                const isVisible = obj.visible !== false;
                html += `
                <div class="layer-item ${isActive ? 'selected' : ''}" data-index="${i}" onclick="selectLayerByIndex(${i})">
                    <i class="fa-solid fa-${obj.type === 'i-text' ? 'font' : obj.type === 'rect' ? 'square' : obj.type === 'ellipse' ? 'circle' : 'vector-square'}"></i>
                    <span class="layer-name">${name}</span>
                    <span class="layer-visibility ${!isVisible ? 'hidden' : ''}" onclick="event.stopPropagation(); toggleLayerVisibility(${i})">
                        <i class="fa-solid fa-${isVisible ? 'eye' : 'eye-slash'}"></i>
                    </span>
                    <span class="layer-actions">
                        <i class="fa-solid fa-trash" onclick="event.stopPropagation(); deleteLayer(${i})" title="Supprimer"></i>
                    </span>
                </div>`;
            }
            list.innerHTML = html || '<div style="color:#666; padding:10px; text-align:center;">Aucun calque</div>';
        }

        function selectLayerByIndex(index) {
            const obj = canvas.getObjects()[index];
            if (obj) {
                canvas.setActiveObject(obj);
                canvas.renderAll();
                updateLayersPanel();
            }
        }

        function toggleLayerVisibility(index) {
            const obj = canvas.getObjects()[index];
            if (obj) {
                obj.visible = !obj.visible;
                canvas.renderAll();
                updateLayersPanel();
            }
        }

        function deleteLayer(index) {
            const obj = canvas.getObjects()[index];
            if (obj) {
                canvas.remove(obj);
                saveState();
                updateLayersPanel();
            }
        }

        function moveLayerUp() {
            const active = canvas.getActiveObject();
            if (!active) return;
            const objects = canvas.getObjects();
            const idx = objects.indexOf(active);
            if (idx < objects.length - 1) {
                canvas.moveTo(active, idx + 1);
                saveState();
                updateLayersPanel();
            }
        }

        function moveLayerDown() {
            const active = canvas.getActiveObject();
            if (!active) return;
            const objects = canvas.getObjects();
            const idx = objects.indexOf(active);
            if (idx > 0) {
                canvas.moveTo(active, idx - 1);
                saveState();
                updateLayersPanel();
            }
        }

        function duplicateLayer() {
            const active = canvas.getActiveObject();
            if (!active) return;
            active.clone((cloned) => {
                cloned.set({ left: active.left + 20, top: active.top + 20 });
                canvas.add(cloned);
                canvas.setActiveObject(cloned);
                saveState();
                updateLayersPanel();
            });
        }

        // ==================== MISE À JOUR DES PROPRIÉTÉS ====================
        function updateProperty(prop, value) {
            const active = canvas.getActiveObject();
            if (!active) return;

            switch (prop) {
                case 'fill':
                    active.set('fill', value);
                    break;
                case 'stroke':
                    active.set('stroke', value);
                    break;
                case 'strokeWidth':
                    const sw = parseInt(value);
                    active.set('strokeWidth', sw);
                    document.getElementById('strokeWidthNum').value = sw;
                    break;
                case 'opacity':
                    const op = parseFloat(value);
                    active.set('opacity', op);
                    document.getElementById('opacityVal').textContent = Math.round(op * 100) + '%';
                    break;
            }
            canvas.renderAll();
            saveState();
        }

        // Synchronise les sliders avec l'objet sélectionné
        canvas.on('selection:created', updatePropsPanel);
        canvas.on('selection:updated', updatePropsPanel);
        canvas.on('selection:cleared', () => {
            // Réinitialiser les valeurs par défaut si rien n'est sélectionné
            document.getElementById('fillColor').value = '#cc0000';
            document.getElementById('strokeColor').value = '#000000';
            document.getElementById('strokeWidth').value = 2;
            document.getElementById('strokeWidthNum').value = 2;
            document.getElementById('opacity').value = 1;
            document.getElementById('opacityVal').textContent = '100%';
        });

        function updatePropsPanel() {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            document.getElementById('fillColor').value = obj.fill || '#000000';
            document.getElementById('strokeColor').value = obj.stroke || '#000000';
            const sw = obj.strokeWidth || 0;
            document.getElementById('strokeWidth').value = sw;
            document.getElementById('strokeWidthNum').value = sw;
            const op = obj.opacity ?? 1;
            document.getElementById('opacity').value = op;
            document.getElementById('opacityVal').textContent = Math.round(op * 100) + '%';
        }

        // ==================== FONCTIONS DOCUMENT ====================
        function newDocument() {
            if (confirm('Créer un nouveau document ? Toutes les modifications seront perdues.')) {
                canvas.clear();
                canvas.backgroundColor = '#050000';
                saveState();
                updateLayersPanel();
                fitCanvasToScreen();
            }
        }

        function downloadImage(format) {
            const dataURL = canvas.toDataURL({
                format: format === 'jpeg' ? 'jpeg' : 'png',
                quality: 1.0,
                multiplier: 1, // taille réelle
            });
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `poster.${format}`;
            link.click();
        }

        function resizeCanvas() {
            const w = parseInt(document.getElementById('canvasWidth').value) || 2480;
            const h = parseInt(document.getElementById('canvasHeight').value) || 3508;
            canvas.setWidth(w);
            canvas.setHeight(h);
            fitCanvasToScreen();
            saveState();
            updateStatusBar();
        }

        function updateStatusBar() {
            document.getElementById('canvasSizeInfo').textContent = `${canvas.width} × ${canvas.height} px`;
            const zoom = Math.round(canvas.getZoom() * 100);
            document.getElementById('zoomInfo').textContent = `${zoom}%`;
        }

        // Raccourcis clavier
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
            if (e.key === 'v') currentTool = 'select'; // V pour sélection
            if (e.key === 'r') currentTool = 'rectangle';
            if (e.key === 'c') currentTool = 'circle';
            if (e.key === 'l') currentTool = 'line';
            if (e.key === 't') currentTool = 'text';
        });

        // Initialiser les calques
        updateLayersPanel();
        updateStatusBar();

        // Empêcher la sélection par défaut du navigateur sur le canvas
        document.getElementById('myCanvas').addEventListener('selectstart', (e) => e.preventDefault());
    </script>
</body>
</html>
